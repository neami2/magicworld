<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم العجائب | عروض سحرية وترفيهية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --magic-purple: #6b21a8;
            --magic-pink: #db2777;
            --magic-gold: #fbbf24;
            --magic-dark: #1e1b4b;
            --magic-darker: #0f0a1e;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--magic-darker) 0%, var(--magic-dark) 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Nav */
        nav {
            position: fixed; top: 0; width: 100%; padding: 1rem 5%;
            background: rgba(30, 27, 75, 0.95); backdrop-filter: blur(10px);
            z-index: 1000; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid var(--magic-gold);
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--magic-gold); }

        /* Hero */
        .hero { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(45deg, var(--magic-gold), var(--magic-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Gallery & Grid */
        .section-title { text-align: center; margin: 40px 0; }
        .gallery-grid, .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; padding: 20px;
        }

        .gallery-item img { width: 100%; border-radius: 15px; border: 2px solid var(--magic-gold); transition: 0.3s; }
        .gallery-item img:hover { transform: scale(1.05); }

        /* Show Cards */
        .shows-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .show-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--magic-gold); }

        /* Shop Styles */
        .product-card { background: white; color: #333; border-radius: 15px; overflow: hidden; text-align: center; padding-bottom: 15px; }
        .product-icon { font-size: 3rem; padding: 20px; background: #eee; display: block; }
        .btn-magic { background: var(--magic-purple); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; text-decoration: none; }

        /* Responsive Fixes (التعديل الذي طلبته للجوال) */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .nav-links { display: none; } /* إخفاء الروابط لتوفير مساحة */
            .gallery-grid, .products-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); /* حبتين بجانب بعض في الجوال */
                gap: 10px;
                padding: 10px;
            }
            .product-icon { font-size: 2rem; }
            .show-card { margin: 10px; }
        }

        /* Cart Sidebar */
        .cart-sidebar { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: white; color: black; z-index: 2000; transition: 0.3s; padding: 20px; }
        .cart-sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>

<body>

    <nav>
        <div class="logo"><i class="fas fa-hat-wizard"></i> عالم العجائب</div>
        <div class="cart-icon" onclick="toggleCart()" style="cursor:pointer">
            <i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>عالم العجائب السحري</h1>
            <p>عروض مذهلة وأدوات سحرية احترافية في شفاعمرو</p><br>
            <a href="https://wa.me/972522842119" class="btn-magic">تواصل واتساب مباشر</a>
        </div>
    </section>

    <section id="gallery">
        <div class="section-title"><h2>معرض الصور</h2></div>
        <div class="gallery-grid" id="galleryGrid">
            </div>
    </section>

    <section id="shop">
        <div class="section-title"><h2>المتجر السحري</h2></div>
        <div class="products-grid" id="productsGrid">
            </div>
    </section>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <h3>سلة المشتريات</h3><hr><br>
        <div id="cartItems">السلة فارغة</div><br>
        <button class="btn-magic" style="width:100%" onclick="checkout()">إتمام الطلب عبر واتساب</button>
    </div>

    <script>
        // بيانات الصور
        const images = [
            'https://cdn.discordapp.com/attachments/1432636030460235786/1481432914108612860/IMG_2374.png',
            'https://cdn.discordapp.com/attachments/1432636030460235786/1481432915014582403/IMG_2368.png',
            'https://cdn.discordapp.com/attachments/1432636030460235786/1481432914385178727/IMG_2373.png',
            'https://cdn.discordapp.com/attachments/1432636030460235786/1481432915265982575/IMG_2366.png'
        ];

        // بيانات المنتجات
        const products = [
            { id: 1, name: 'عصا سحرية', price: 50, icon: '🪄' },
            { id: 2, name: 'مجموعة بالونات', price: 30, icon: '🎈' },
            { id: 3, name: 'قبعة الساحر', price: 70, icon: '🎩' },
            { id: 4, name: 'خدع ورقية', price: 40, icon: '🃏' }
        ];

        let cart = [];

        // عرض الصور
        const gGrid = document.getElementById('galleryGrid');
        images.forEach(src => {
            gGrid.innerHTML += `<div class="gallery-item"><img src="${src}"></div>`;
        });

        // عرض المنتجات
        const pGrid = document.getElementById('productsGrid');
        products.forEach(p => {
            pGrid.innerHTML += `
                <div class="product-card">
                    <span class="product-icon">${p.icon}</span>
                    <h3>${p.name}</h3>
                    <p>${p.price} شيكل</p><br>
                    <button class="btn-magic" onclick="addToCart(${p.id})">إضافة للسلة</button>
                </div>`;
        });

        function addToCart(id) {
            const p = products.find(item => item.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            const cItems = document.getElementById('cartItems');
            if(cart.length === 0) {
                cItems.innerHTML = "السلة فارغة";
            } else {
                cItems.innerHTML = cart.map(i => `<div>${i.name} - ${i.price} شيكل</div>`).join('');
            }
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function checkout() {
            if(cart.length === 0) return alert("السلة فارغة");
            let msg = "مرحباً، أريد طلب:\n" + cart.map(i => "- " + i.name).join('\n');
            window.open(`https://wa.me/972522842119?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
